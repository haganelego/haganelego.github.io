role: Postdoctoral Researcher
bio: |
  Daiju Kanaoka received the B.Eng. and M.Eng. degrees from Kyushu Institute of Technology, Japan, in 2020 and 2022, and the Ph.D. degree in engineering from Kyushu Institute of Technology in 2025.
  He is currently a Postdoctoral Researcher at RIKEN, Guardian Robot Project.
  His research interests include multimodal learning, 3D reconstruction, human-robot interaction, and service robotics.
  He is a member of the IEEE and RSJ.

